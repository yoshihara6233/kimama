  <!-- 湯気 -->
  <path d="M163 115 Q168 97 162 81" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2" stroke-linecap="round"/>
  <path d="M187 110 Q192 93 186 77" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="2" stroke-linecap="round"/>

  <!-- 希少部位テキスト -->
