<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d090"/>
      <stop offset="50%" style="stop-color:#c8a850"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="meat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c85810"/>
      <stop offset="50%" style="stop-color:#903808"/>
      <stop offset="100%" style="stop-color:#6a2005"/>
    </linearGradient>
    <linearGradient id="negi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d840"/>
      <stop offset="50%" style="stop-color:#90a820"/>
      <stop offset="100%" style="stop-color:#607015"/>
    </linearGradient>
    <linearGradient id="negiChar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8b030"/>
      <stop offset="100%" style="stop-color:#405010"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e86020;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="280" rx="180" ry="60" fill="#c84000" opacity="0.1" filter="url(#blur1)"/>
  <rect width="400" height="300" fill="url(#glow)"/>

  <!-- 皿 -->
  <ellipse cx="200" cy="238" rx="152" ry="28" fill="#2a1a0a" stroke="#3a2510" stroke-width="2"/>
  <ellipse cx="200" cy="235" rx="147" ry="22" fill="#221408"/>

  <!-- 串1 -->
  <rect x="80" y="105" width="6" height="152" rx="3" fill="url(#skewer)" transform="rotate(-35 158 202)"/>
  <!-- 串1の食材（肉・ねぎ交互） -->
  <g transform="rotate(-35 158 202)">
    <!-- ネギ -->
    <ellipse cx="83" cy="140" rx="10" ry="15" fill="url(#negi)" stroke="#506010" stroke-width="0.8"/>
    <ellipse cx="83" cy="140" rx="6" ry="5" fill="#d8e840" opacity="0.5" transform="translate(-1,-4)"/>
    <line x1="78" y1="135" x2="88" y2="133" stroke="#405010" stroke-width="1" opacity="0.7"/>
    <!-- 肉 -->
    <ellipse cx="83" cy="163" rx="17" ry="18" fill="url(#meat)"/>
    <ellipse cx="83" cy="163" rx="9" ry="5" fill="#e87030" opacity="0.4" transform="translate(-2,-5)"/>
    <line x1="70" y1="157" x2="96" y2="161" stroke="#3a1000" stroke-width="1.5" opacity="0.5"/>
    <!-- ネギ -->
    <ellipse cx="83" cy="186" rx="10" ry="15" fill="url(#negiChar)" stroke="#405010" stroke-width="0.8"/>
    <ellipse cx="83" cy="186" rx="6" ry="5" fill="#a8b830" opacity="0.4" transform="translate(-1,-4)"/>
    <!-- 肉 -->
    <ellipse cx="83" cy="208" rx="17" ry="18" fill="url(#meat)"/>
    <ellipse cx="83" cy="208" rx="9" ry="5" fill="#e87030" opacity="0.35" transform="translate(-2,-5)"/>
    <line x1="70" y1="202" x2="96" y2="206" stroke="#3a1000" stroke-width="1.5" opacity="0.5"/>
    <!-- ネギ -->
    <ellipse cx="83" cy="228" rx="10" ry="13" fill="url(#negi)" stroke="#506010" stroke-width="0.8"/>
  </g>

  <!-- 串2 -->
  <rect x="108" y="105" width="6" height="152" rx="3" fill="url(#skewer)" transform="rotate(-35 186 202)"/>
  <g transform="rotate(-35 186 202)">
    <ellipse cx="111" cy="140" rx="17" ry="18" fill="url(#meat)"/>
    <ellipse cx="111" cy="140" rx="9" ry="5" fill="#e87030" opacity="0.4" transform="translate(-2,-5)"/>
    <line x1="98" y1="134" x2="124" y2="138" stroke="#3a1000" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="111" cy="163" rx="10" ry="15" fill="url(#negiChar)" stroke="#405010" stroke-width="0.8"/>
    <ellipse cx="111" cy="163" rx="6" ry="5" fill="#a8b830" opacity="0.4" transform="translate(-1,-4)"/>
    <ellipse cx="111" cy="186" rx="17" ry="18" fill="url(#meat)"/>
    <ellipse cx="111" cy="186" rx="9" ry="5" fill="#e87030" opacity="0.4" transform="translate(-2,-5)"/>
    <line x1="98" y1="180" x2="124" y2="184" stroke="#3a1000" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="111" cy="208" rx="10" ry="14" fill="url(#negi)" stroke="#506010" stroke-width="0.8"/>
    <ellipse cx="111" cy="208" rx="6" ry="5" fill="#d8e840" opacity="0.5" transform="translate(-1,-4)"/>
    <ellipse cx="111" cy="228" rx="17" ry="17" fill="url(#meat)"/>
  </g>

  <!-- 湯気 -->
  <path d="M165 118 Q170 100 164 84" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2" stroke-linecap="round"/>
  <path d="M188 112 Q193 95 187 79" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="2" stroke-linecap="round"/>

  <text x="200" y="275" font-family="serif" font-size="15" fill="rgba(255,220,150,0.85)" text-anchor="middle" letter-spacing="5">ね ぎ ま</text>
</svg>
