<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#2a4a6a"/>
    </linearGradient>
    <linearGradient id="beerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#d4830a"/>
    </linearGradient>
    <linearGradient id="foamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffdf0"/>
      <stop offset="100%" style="stop-color:#f0e8c8"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- ジョッキ本体 -->
  <path d="M148 80 L152 240 L248 240 L252 80 Z" fill="url(#beerGrad)" opacity="0.95"/>
  <!-- ビール液面 -->
  <rect x="148" y="80" width="104" height="15" fill="#f5c842" opacity="0.3"/>

  <!-- ジョッキ形のクリップ -->
  <path d="M148 80 L152 240 L248 240 L252 80 Z" fill="url(#glassGrad)"/>

  <!-- ガラスのアウトライン -->
  <path d="M148 80 L152 240 L248 240 L252 80 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- 取っ手 -->
  <path d="M252 110 Q285 110 285 150 Q285 190 252 190" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="10" stroke-linecap="round"/>
  <path d="M252 110 Q280 110 280 150 Q280 190 252 190" fill="none" stroke="url(#beerGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- 泡 -->
  <ellipse cx="200" cy="80" rx="52" ry="22" fill="url(#foamGrad)"/>
  <!-- 泡の丸 -->
  <circle cx="175" cy="68" r="12" fill="#fffdf0"/>
  <circle cx="195" cy="62" r="15" fill="#fffef5"/>
  <circle cx="215" cy="66" r="13" fill="#fffdf0"/>
  <circle cx="230" cy="72" r="10" fill="#f5f0e0"/>
  <circle cx="168" cy="74" r="9" fill="#f5f0e0"/>
  <ellipse cx="200" cy="80" rx="52" ry="10" fill="#f0e8c8" opacity="0.6"/>

  <!-- 泡粒（ビール内） -->
  <circle cx="170" cy="160" r="2" fill="rgba(255,220,100,0.6)"/>
  <circle cx="185" cy="130" r="1.5" fill="rgba(255,220,100,0.5)"/>
  <circle cx="210" cy="150" r="2" fill="rgba(255,220,100,0.6)"/>
  <circle cx="225" cy="120" r="1.5" fill="rgba(255,220,100,0.5)"/>
  <circle cx="195" cy="180" r="2" fill="rgba(255,220,100,0.6)"/>

  <!-- ガラスの光沢 -->
  <path d="M155 95 L158 225" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>

  <!-- テキスト -->
  <text x="200" y="270" font-family="serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="4">生ビール</text>
</svg>
