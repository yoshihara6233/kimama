<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d090"/>
      <stop offset="50%" style="stop-color:#c8a850"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="meat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8580a"/>
      <stop offset="40%" style="stop-color:#a03808"/>
      <stop offset="100%" style="stop-color:#7a2005"/>
    </linearGradient>
    <linearGradient id="meat2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b84808"/>
      <stop offset="50%" style="stop-color:#8a2e06"/>
      <stop offset="100%" style="stop-color:#6a1a04"/>
    </linearGradient>
    <linearGradient id="tare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a2000;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1a0800;stop-opacity:0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e86020;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- 炭火の光 -->
  <ellipse cx="200" cy="280" rx="180" ry="60" fill="#c84000" opacity="0.12" filter="url(#blur1)"/>
  <rect width="400" height="300" fill="url(#glow)"/>

  <!-- 皿 -->
  <ellipse cx="200" cy="235" rx="150" ry="28" fill="#2a1a0a" stroke="#3a2510" stroke-width="2"/>
  <ellipse cx="200" cy="232" rx="145" ry="22" fill="#221408"/>

  <!-- 串1（後ろ） -->
  <rect x="82" y="108" width="6" height="148" rx="3" fill="url(#skewer)" transform="rotate(-35 160 200)"/>

  <!-- 串2（前） -->
  <rect x="108" y="108" width="6" height="148" rx="3" fill="url(#skewer)" transform="rotate(-35 186 200)"/>

  <!-- 串1の肉 -->
  <g transform="rotate(-35 160 200)">
    <ellipse cx="85" cy="145" rx="18" ry="20" fill="url(#meat1)"/>
    <ellipse cx="85" cy="145" rx="18" ry="20" fill="url(#tare)"/>
    <ellipse cx="85" cy="145" rx="10" ry="5" fill="#e87030" opacity="0.4" transform="translate(-3,-5)"/>
    <line x1="72" y1="138" x2="98" y2="142" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="148" x2="100" y2="152" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>

    <ellipse cx="85" cy="177" rx="19" ry="21" fill="url(#meat2)"/>
    <ellipse cx="85" cy="177" rx="19" ry="21" fill="url(#tare)"/>
    <ellipse cx="85" cy="177" rx="11" ry="6" fill="#e87030" opacity="0.35" transform="translate(-2,-6)"/>
    <line x1="71" y1="170" x2="99" y2="174" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="182" x2="100" y2="186" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>

    <ellipse cx="85" cy="210" rx="18" ry="20" fill="url(#meat1)"/>
    <ellipse cx="85" cy="210" rx="18" ry="20" fill="url(#tare)"/>
    <ellipse cx="85" cy="210" rx="10" ry="5" fill="#e87030" opacity="0.4" transform="translate(-3,-5)"/>
  </g>

  <!-- 串2の肉 -->
  <g transform="rotate(-35 186 200)">
    <ellipse cx="111" cy="145" rx="18" ry="20" fill="url(#meat2)"/>
    <ellipse cx="111" cy="145" rx="18" ry="20" fill="url(#tare)"/>
    <ellipse cx="111" cy="145" rx="10" ry="5" fill="#e87030" opacity="0.4" transform="translate(-3,-5)"/>
    <line x1="98" y1="138" x2="124" y2="142" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>
    <line x1="96" y1="148" x2="126" y2="152" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>

    <ellipse cx="111" cy="177" rx="20" ry="21" fill="url(#meat1)"/>
    <ellipse cx="111" cy="177" rx="20" ry="21" fill="url(#tare)"/>
    <ellipse cx="111" cy="177" rx="11" ry="6" fill="#e87030" opacity="0.35" transform="translate(-2,-6)"/>
    <line x1="97" y1="170" x2="125" y2="174" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>
    <line x1="96" y1="182" x2="126" y2="186" stroke="#3a1000" stroke-width="1.5" opacity="0.6"/>

    <ellipse cx="111" cy="210" rx="18" ry="20" fill="url(#meat2)"/>
    <ellipse cx="111" cy="210" rx="18" ry="20" fill="url(#tare)"/>
    <ellipse cx="111" cy="210" rx="10" ry="5" fill="#e87030" opacity="0.4" transform="translate(-3,-5)"/>
  </g>

  <!-- 湯気 -->
  <path d="M165 120 Q168 105 163 90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  <path d="M185 115 Q190 98 184 82" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round"/>
  <path d="M205 118 Q208 102 203 87" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>

  <!-- テキスト -->
  <text x="200" y="275" font-family="serif" font-size="15" fill="rgba(255,220,150,0.85)" text-anchor="middle" letter-spacing="5">も　も</text>
</svg>
