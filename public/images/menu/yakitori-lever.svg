<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d090"/>
      <stop offset="50%" style="stop-color:#c8a850"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="lever" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a3020"/>
      <stop offset="40%" style="stop-color:#521810"/>
      <stop offset="100%" style="stop-color:#380c08"/>
    </linearGradient>
    <linearGradient id="leverSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a84030;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#701808;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="tare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#200800;stop-opacity:0.65"/>
      <stop offset="100%" style="stop-color:#050100;stop-opacity:0.45"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#a03020;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="280" rx="180" ry="60" fill="#c84000" opacity="0.1" filter="url(#blur1)"/>
  <rect width="400" height="300" fill="url(#glow)"/>

  <!-- 皿 -->
  <ellipse cx="200" cy="238" rx="152" ry="28" fill="#2a1a0a" stroke="#3a2510" stroke-width="2"/>
  <ellipse cx="200" cy="235" rx="147" ry="22" fill="#221408"/>

  <!-- 生姜（右端に添えて） -->
  <path d="M275 205 Q280 198 288 200 Q296 198 300 205 Q302 212 295 218 Q288 222 281 218 Q274 212 275 205Z" fill="#f0e080" stroke="#c0b040" stroke-width="1" opacity="0.85"/>
  <line x1="276" y1="210" x2="300" y2="208" stroke="#a09030" stroke-width="0.8" opacity="0.7"/>
  <line x1="277" y1="215" x2="299" y2="213" stroke="#a09030" stroke-width="0.8" opacity="0.7"/>

  <!-- 串1 -->
  <rect x="78" y="100" width="5" height="155" rx="2.5" fill="url(#skewer)" transform="rotate(-35 153 200)"/>
