    <path d="M88 124 Q94 115 106 117 Q118 115 124 124 Q129 133 124 144 Q118 152 106 153 Q94 152 88 144 Q83 135 88 124Z" fill="url(#leverSurface)"/>
    <ellipse cx="100" cy="128" rx="8" ry="5" fill="#c05040" opacity="0.3" transform="rotate(-10 100 128)"/>

    <path d="M88 160 Q94 151 106 153 Q118 151 124 160 Q129 169 124 180 Q118 188 106 189 Q94 188 88 180 Q83 171 88 160Z" fill="url(#lever)"/>
    <path d="M88 160 Q94 151 106 153 Q118 151 124 160 Q129 169 124 180 Q118 188 106 189 Q94 188 88 180 Q83 171 88 160Z" fill="url(#tare)"/>
    <path d="M88 160 Q94 151 106 153 Q118 151 124 160 Q129 169 124 180 Q118 188 106 189 Q94 188 88 180 Q83 171 88 160Z" fill="url(#leverSurface)"/>

    <path d="M88 196 Q94 187 106 189 Q118 187 124 196 Q129 205 124 216 Q118 224 106 225 Q94 224 88 216 Q83 207 88 196Z" fill="url(#lever)"/>
    <path d="M88 196 Q94 187 106 189 Q118 187 124 196 Q129 205 124 216 Q118 224 106 225 Q94 224 88 216 Q83 207 88 196Z" fill="url(#tare)"/>
    <path d="M88 196 Q94 187 106 189 Q118 187 124 196 Q129 205 124 216 Q118 224 106 225 Q94 224 88 216 Q83 207 88 196Z" fill="url(#leverSurface)"/>
  </g>

  <!-- 湯気 -->
  <path d="M160 115 Q165 97 159 81" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="2" stroke-linecap="round"/>
  <path d="M183 110 Q188 93 182 77" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2" stroke-linecap="round"/>

  <text x="200" y="275" font-family="serif" font-size="15" fill="rgba(255,220,150,0.85)" text-anchor="middle" letter-spacing="5">レ バ ー</text>
</svg>
