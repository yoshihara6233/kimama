    <path d="M60 124 Q66 115 78 117 Q90 115 96 124 Q101 133 96 144 Q90 152 78 153 Q66 152 60 144 Q55 135 60 124Z" fill="url(#tare)"/>
    <path d="M60 124 Q66 115 78 117 Q90 115 96 124 Q101 133 96 144 Q90 152 78 153 Q66 152 60 144 Q55 135 60 124Z" fill="url(#leverSurface)"/>
