    <line x1="61" y1="135" x2="96" y2="133" stroke="#200800" stroke-width="1.5" opacity="0.4"/>

    <path d="M60 160 Q66 151 78 153 Q90 151 96 160 Q101 169 96 180 Q90 188 78 189 Q66 188 60 180 Q55 171 60 160Z" fill="url(#lever)"/>
    <path d="M60 160 Q66 151 78 153 Q90 151 96 160 Q101 169 96 180 Q90 188 78 189 Q66 188 60 180 Q55 171 60 160Z" fill="url(#tare)"/>
    <path d="M60 160 Q66 151 78 153 Q90 151 96 160 Q101 169 96 180 Q90 188 78 189 Q66 188 60 180 Q55 171 60 160Z" fill="url(#leverSurface)"/>
    <ellipse cx="72" cy="164" rx="8" ry="5" fill="#c05040" opacity="0.3" transform="rotate(-10 72 164)"/>

    <path d="M60 196 Q66 187 78 189 Q90 187 96 196 Q101 205 96 216 Q90 224 78 225 Q66 224 60 216 Q55 207 60 196Z" fill="url(#lever)"/>
    <path d="M60 196 Q66 187 78 189 Q90 187 96 196 Q101 205 96 216 Q90 224 78 225 Q66 224 60 216 Q55 207 60 196Z" fill="url(#tare)"/>
    <path d="M60 196 Q66 187 78 189 Q90 187 96 196 Q101 205 96 216 Q90 224 78 225 Q66 224 60 216 Q55 207 60 196Z" fill="url(#leverSurface)"/>
  </g>

  <!-- 串2 -->
  <rect x="106" y="100" width="5" height="155" rx="2.5" fill="url(#skewer)" transform="rotate(-35 181 200)"/>
