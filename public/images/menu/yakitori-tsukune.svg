<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1008"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d090"/>
      <stop offset="50%" style="stop-color:#c8a850"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="tsukune" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b86020"/>
      <stop offset="40%" style="stop-color:#8a3a10"/>
      <stop offset="100%" style="stop-color:#5a2008"/>
    </linearGradient>
    <linearGradient id="tare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1500;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0a0500;stop-opacity:0.6"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#f0a040;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e86020;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="280" rx="180" ry="60" fill="#c84000" opacity="0.1" filter="url(#blur1)"/>
  <rect width="400" height="300" fill="url(#glow)"/>

  <!-- 皿 -->
  <ellipse cx="200" cy="238" rx="152" ry="28" fill="#2a1a0a" stroke="#3a2510" stroke-width="2"/>
  <ellipse cx="200" cy="235" rx="147" ry="22" fill="#221408"/>

  <!-- 卵黄（隣に添えて） -->
  <ellipse cx="285" cy="210" rx="22" ry="16" fill="#f0d060" opacity="0.9"/>
  <ellipse cx="285" cy="210" rx="16" ry="11" fill="#f5c030" opacity="0.9"/>
  <ellipse cx="279" cy="205" rx="5" ry="4" fill="#ffe080" opacity="0.6"/>

  <!-- 串1 -->
  <rect x="78" y="100" width="6" height="155" rx="3" fill="url(#skewer)" transform="rotate(-35 155 200)"/>
  <g transform="rotate(-35 155 200)">
    <!-- つくね1（大きめ楕円） -->
    <ellipse cx="81" cy="138" rx="20" ry="22" fill="url(#tsukune)"/>
    <ellipse cx="81" cy="138" rx="20" ry="22" fill="url(#tare)"/>
    <ellipse cx="81" cy="138" rx="20" ry="22" fill="url(#shine)"/>
    <line x1="66" y1="132" x2="96" y2="128" stroke="#2a1000" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="142" x2="97" y2="138" stroke="#2a1000" stroke-width="1.5" opacity="0.5"/>

    <ellipse cx="81" cy="172" rx="21" ry="23" fill="url(#tsukune)"/>
    <ellipse cx="81" cy="172" rx="21" ry="23" fill="url(#tare)"/>
    <ellipse cx="81" cy="172" rx="21" ry="23" fill="url(#shine)"/>
    <line x1="64" y1="166" x2="98" y2="162" stroke="#2a1000" stroke-width="1.5" opacity="0.5"/>

    <ellipse cx="81" cy="207" rx="20" ry="22" fill="url(#tsukune)"/>
    <ellipse cx="81" cy="207" rx="20" ry="22" fill="url(#tare)"/>
    <ellipse cx="81" cy="207" rx="20" ry="22" fill="url(#shine)"/>
  </g>

  <!-- 串2 -->
  <rect x="108" y="100" width="6" height="155" rx="3" fill="url(#skewer)" transform="rotate(-35 185 200)"/>
  <g transform="rotate(-35 185 200)">
    <ellipse cx="111" cy="138" rx="20" ry="22" fill="url(#tsukune)"/>
    <ellipse cx="111" cy="138" rx="20" ry="22" fill="url(#tare)"/>
    <ellipse cx="111" cy="138" rx="20" ry="22" fill="url(#shine)"/>
    <line x1="96" y1="132" x2="126" y2="128" stroke="#2a1000" stroke-width="1.5" opacity="0.5"/>

    <ellipse cx="111" cy="172" rx="21" ry="23" fill="url(#tsukune)"/>
    <ellipse cx="111" cy="172" rx="21" ry="23" fill="url(#tare)"/>
    <ellipse cx="111" cy="172" rx="21" ry="23" fill="url(#shine)"/>
    <line x1="95" y1="166" x2="127" y2="162" stroke="#2a1000" stroke-width="1.5" opacity="0.5"/>

    <ellipse cx="111" cy="207" rx="20" ry="22" fill="url(#tsukune)"/>
    <ellipse cx="111" cy="207" rx="20" ry="22" fill="url(#tare)"/>
    <ellipse cx="111" cy="207" rx="20" ry="22" fill="url(#shine)"/>
  </g>

  <!-- タレが垂れる描写 -->
  <path d="M168 205 Q170 218 168 228" fill="none" stroke="#3a1500" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- 湯気 -->
  <path d="M162 115 Q167 97 161 81" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2" stroke-linecap="round"/>
  <path d="M186 110 Q191 93 185 77" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="2" stroke-linecap="round"/>

  <text x="200" y="275" font-family="serif" font-size="15" fill="rgba(255,220,150,0.85)" text-anchor="middle" letter-spacing="5">つ く ね</text>
</svg>
